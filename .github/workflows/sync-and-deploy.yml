name: Sync & Deploy

on:
  schedule:
    - cron: '0 2 * * *'  # 每天凌晨 2 点（UTC）自动同步
  workflow_dispatch:      # 支持手动触发

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream
        id: sync
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/AmintaCCCP/GithubStarsManager.git || true
          git fetch upstream main
          if git merge upstream/main --no-edit --allow-unrelated-histories; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Upstream merged successfully"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Merge conflict, skipping push"
            git merge --abort
          fi

      - name: Push
        if: steps.sync.outputs.changed == 'true'
        run: git push origin main

  build-and-deploy:
    needs: sync
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=github-stars
